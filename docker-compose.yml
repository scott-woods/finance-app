services:
     postgres:
       image: postgres:16
       container_name: finance-app-db
       restart: unless-stopped
       environment:
         POSTGRES_USER: finance_app
         POSTGRES_PASSWORD: localdevpassword
         POSTGRES_DB: finance_app
       ports:
         - "5432:5432"
       volumes:
         - finance-app-pgdata:/var/lib/postgresql/data

volumes:
  finance-app-pgdata: