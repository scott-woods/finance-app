openapi: 3.0.3
info:
  title: Finance App API
  version: 0.1.0
paths:
  /accounts:
    get:
      operationId: listAccounts
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
    post:
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInput'
      responses:
        '201':
          description: Created account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
  /accounts/{id}:
    get:
      operationId: getAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: A single account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found
    put:
      operationId: updateAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInput'
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: Account not found
    delete:
      operationId: deleteAccount
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Account deleted
        '404':
          description: Account not found
  /accounts/{id}/snapshots:
    get:
      operationId: listAccountSnapshots
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of snapshots for this account
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountSnapshot'
    post:
      operationId: createAccountSnapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountSnapshotInput'
      responses:
        '201':
          description: Created snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSnapshot'
        '404':
          description: Account not found
  /accounts/{id}/snapshots/{snapshotId}:
    put:
      operationId: updateAccountSnapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: snapshotId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountSnapshotInput'
      responses:
        '200':
          description: Updated snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSnapshot'
        '404':
          description: Snapshot not found
    delete:
      operationId: deleteAccountSnapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: snapshotId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Snapshot deleted
        '404':
          description: Snapshot not found
  /net-worth/summary:
    get:
      operationId: getNetWorthSummary
      responses:
        '200':
          description: Net worth summary grouped by account type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetWorthSummary'
  /net-worth/trend:
    get:
      operationId: getNetWorthTrend
      responses:
        '200':
          description: Net worth over time, one point per date any account changed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NetWorthTrendPoint'

components:
  schemas:
    AccountStatus:
      type: string
      enum:
        - active
        - closed
        - hidden
    AccountType:
      type: string
      enum:
        - checking
        - savings
        - credit_card
        - investment
        - real_estate
        - vehicle
        - loan
        - other_asset
        - other_debt
    AccountInput:
      type: object
      required:
        - name
        - type
        - is_asset
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/AccountType'
        is_asset:
          type: boolean
        credit_limit:
          type: number
          format: double
          nullable: true
        status:
          $ref: '#/components/schemas/AccountStatus'
          default: active
    Account:
      allOf:
        - $ref: '#/components/schemas/AccountInput'
        - type: object
          required:
            - id
            - created_at
          properties:
            id:
              type: integer
            created_at:
              type: string
              format: date-time
            closed_at:
              type: string
              format: date-time
              nullable: true
    AccountSnapshotInput:
      type: object
      required:
        - balance
        - as_of_date
      properties:
        balance:
          type: number
          format: double
        as_of_date:
          type: string
          format: date-time
    AccountSnapshot:
      allOf:
        - $ref: '#/components/schemas/AccountSnapshotInput'
        - type: object
          required:
            - id
            - account_id
          properties:
            id:
              type: integer
            account_id:
              type: integer
    AccountBalance:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          $ref: '#/components/schemas/AccountType'
        balance:
          type: number
          format: double
          nullable: true
        as_of_date:
          type: string
          format: date-time
          nullable: true
    AccountTypeGroup:
      type: object
      required:
        - type
        - subtotal
        - accounts
      properties:
        type:
          $ref: '#/components/schemas/AccountType'
        subtotal:
          type: number
          format: double
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountBalance'
    NetWorthSummary:
      type: object
      required:
        - net_worth
        - total_assets
        - total_debts
        - asset_groups
        - debt_groups
      properties:
        net_worth:
          type: number
          format: double
        total_assets:
          type: number
          format: double
        total_debts:
          type: number
          format: double
        asset_groups:
          type: array
          items:
            $ref: '#/components/schemas/AccountTypeGroup'
        debt_groups:
          type: array
          items:
            $ref: '#/components/schemas/AccountTypeGroup'
    NetWorthTrendPoint:
      type: object
      required:
        - as_of_date
        - net_worth
        - total_assets
        - total_debts
      properties:
        as_of_date:
          type: string
          format: date-time
        net_worth:
          type: number
          format: double
        total_assets:
          type: number
          format: double
        total_debts:
          type: number
          format: double
